<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOWN — 로그인 / 회원가입</title>

<style>
@font-face { font-family:'Pretendard'; src:url('../fonts/Pretendard-Regular.woff2') format('woff2'); font-weight:400; font-display:swap; }
@font-face { font-family:'Pretendard'; src:url('../fonts/Pretendard-Medium.woff2') format('woff2'); font-weight:500; font-display:swap; }
@font-face { font-family:'Pretendard'; src:url('../fonts/Pretendard-SemiBold.woff2') format('woff2'); font-weight:600; font-display:swap; }
@font-face { font-family:'Pretendard'; src:url('../fonts/Pretendard-Bold.woff2') format('woff2'); font-weight:700; font-display:swap; }
@font-face { font-family:'Pretendard'; src:url('../fonts/Pretendard-ExtraBold.woff2') format('woff2'); font-weight:800; font-display:swap; }
@font-face { font-family:'Suit'; src:url('../fonts/SUIT-Regular.otf') format('opentype'); font-weight:400; font-display:swap; }
@font-face { font-family:'Suit'; src:url('../fonts/SUIT-Medium.otf') format('opentype'); font-weight:500; font-display:swap; }
@font-face { font-family:'Suit'; src:url('../fonts/SUIT-Bold.otf') format('opentype'); font-weight:700; font-display:swap; }
@font-face { font-family:'GMarketSans'; src:url('../fonts/GMarketSans-Bold.ttf') format('truetype'); font-weight:700; font-display:swap; }


*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }

:root {
  --bg:#F5F0E8;
  --bg-subtle:#EDE7D8;
  --bg-dark:#054f19;
  --text:#111A13;
  --text-muted:#4A5C4D;
  --text-light:#8A9B8D;
  --green:#054f19;
  --green-dark:#033610;
  --lime:#DAF15B;
  --lime-dark:#B8CC3A;
  --white:#FFFFFF;
  --border:rgba(5,79,25,0.12);
  --shadow-sm:0 1px 4px rgba(5,79,25,0.08);
  --shadow-md:0 4px 16px rgba(5,79,25,0.12);
  --error:#C0392B;
  --f-head:'Pretendard',sans-serif;
  --f-body:'Suit','Noto Sans KR',sans-serif;
  --f-label:'GMarketSans','Suit',sans-serif;
  --r-sm:4px;
  --r-md:8px;
  --r-lg:16px;
  --r-full:999px;
}

body {
  background:#D8D3CC;
  font-family:var(--f-body);
  color:var(--text);
  -webkit-font-smoothing:antialiased;
}

.page {
  max-width:430px;
  min-width:375px;
  margin:0 auto;
  background:var(--bg);
  min-height:100vh;
  display:flex;
  flex-direction:column;
}

/* ── 헤더 ── */
.gnb {
  position:sticky;
  top:0;
  z-index:100;
  height:52px;
  background:var(--bg);
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:0 16px;
}
.gnb-back {
  position:absolute;
  left:16px;
  width:36px;
  height:36px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:none;
  border:none;
  cursor:pointer;
  color:var(--green);
  border-radius:var(--r-sm);
  transition:background 0.15s;
}
.gnb-back:hover { background:var(--bg-subtle); }
.gnb-back svg { width:20px; height:20px; }
.gnb-logo {
  font-family:var(--f-head);
  font-size:20px;
  font-weight:700;
  color:var(--green);
  letter-spacing:0.06em;
}

/* ── 브랜드 아이덴티티 영역 ── */
.brand-area {
  padding:32px 20px 24px;
  text-align:center;
}
.brand-title {
  font-family:var(--f-head);
  font-size:28px;
  font-weight:700;
  color:var(--green);
  letter-spacing:0.08em;
  margin-bottom:8px;
}
.brand-sub {
  font-family:var(--f-label);
  font-size:11px;
  font-weight:700;
  color:var(--text-muted);
  letter-spacing:0.15em;
  text-transform:uppercase;
}

/* ── 탭 ── */
.tab-wrap {
  display:flex;
  border-bottom:1px solid var(--border);
  padding:0 20px;
}
.tab-btn {
  flex:1;
  height:46px;
  background:none;
  border:none;
  border-bottom:2px solid transparent;
  font-family:var(--f-body);
  font-size:14px;
  font-weight:400;
  color:var(--text-light);
  cursor:pointer;
  transition:all 0.2s;
  margin-bottom:-1px;
}
.tab-btn.active {
  border-bottom:2px solid var(--green);
  color:var(--green);
  font-weight:700;
}

/* ── 폼 공통 ── */
.form-area {
  padding:24px 20px 32px;
  display:flex;
  flex-direction:column;
  gap:16px;
}
.form-area.hidden { display:none; }

.field {
  display:flex;
  flex-direction:column;
  gap:6px;
}
.field-label {
  font-family:var(--f-body);
  font-size:13px;
  font-weight:500;
  color:var(--text-muted);
}
.input-wrap {
  position:relative;
  display:flex;
  align-items:center;
}
.input-wrap input {
  width:100%;
  padding:12px 14px;
  border:1.5px solid var(--border);
  border-radius:var(--r-sm);
  font-family:var(--f-body);
  font-size:14px;
  color:var(--text);
  background:var(--white);
  outline:none;
  transition:border-color 0.2s;
  -webkit-appearance:none;
}
.input-wrap input::placeholder { color:var(--text-light); }
.input-wrap input:focus { border-color:var(--green); }
.input-wrap input.error { border-color:var(--error); }
.input-wrap input.has-icon { padding-right:44px; }

.toggle-pw {
  position:absolute;
  right:12px;
  width:28px;
  height:28px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:none;
  border:none;
  cursor:pointer;
  color:var(--text-light);
  border-radius:var(--r-sm);
  transition:color 0.15s;
}
.toggle-pw:hover { color:var(--green); }
.toggle-pw svg { width:18px; height:18px; }

.field-error {
  font-family:var(--f-body);
  font-size:12px;
  color:var(--error);
  display:none;
  line-height:1.4;
}
.field-error.visible { display:block; }

/* ── 비밀번호 찾기 ── */
.forgot-wrap {
  display:flex;
  justify-content:flex-end;
  margin-top:-8px;
}
.forgot-link {
  font-family:var(--f-body);
  font-size:12px;
  color:var(--text-muted);
  text-decoration:none;
  border-bottom:1px solid var(--border);
  transition:color 0.15s;
}
.forgot-link:hover { color:var(--green); }

/* ── 버튼 primary ── */
.btn-primary {
  width:100%;
  height:50px;
  background:var(--green);
  color:var(--white);
  font-family:var(--f-head);
  font-size:14px;
  font-weight:700;
  border:none;
  border-radius:var(--r-md);
  cursor:pointer;
  letter-spacing:0.04em;
  transition:background 0.2s, transform 0.1s;
}
.btn-primary:hover { background:var(--green-dark); }
.btn-primary:active { transform:scale(0.99); }

/* ── 구분선 ── */
.divider {
  display:flex;
  align-items:center;
  gap:12px;
  margin:4px 0;
}
.divider::before,
.divider::after {
  content:'';
  flex:1;
  height:1px;
  background:var(--border);
}
.divider span {
  font-family:var(--f-body);
  font-size:12px;
  color:var(--text-light);
  white-space:nowrap;
}

/* ── 소셜 로그인 ── */
.btn-social {
  width:100%;
  height:48px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  border:none;
  border-radius:var(--r-md);
  font-family:var(--f-body);
  font-size:14px;
  font-weight:500;
  cursor:pointer;
  transition:opacity 0.15s, transform 0.1s;
  letter-spacing:0.01em;
}
.btn-social:hover { opacity:0.88; }
.btn-social:active { transform:scale(0.99); }
.btn-kakao {
  background:#FEE500;
  color:#3C1E1E;
}
.btn-naver {
  background:#03C75A;
  color:#FFFFFF;
}
.btn-social svg { width:20px; height:20px; flex-shrink:0; }

/* ── 체크박스 ── */
.checkbox-group {
  display:flex;
  flex-direction:column;
  gap:10px;
  padding:4px 0;
}
.checkbox-item {
  display:flex;
  align-items:flex-start;
  gap:10px;
  cursor:pointer;
  user-select:none;
}
.checkbox-item input[type="checkbox"] {
  position:absolute;
  opacity:0;
  width:0;
  height:0;
}
.checkbox-box {
  width:16px;
  height:16px;
  min-width:16px;
  border:1.5px solid var(--border);
  border-radius:var(--r-sm);
  background:var(--white);
  display:flex;
  align-items:center;
  justify-content:center;
  margin-top:1px;
  transition:all 0.15s;
}
.checkbox-item input:checked + .checkbox-box {
  background:var(--green);
  border-color:var(--green);
}
.checkbox-item input:checked + .checkbox-box svg { opacity:1; }
.checkbox-box svg {
  width:10px;
  height:10px;
  color:var(--white);
  opacity:0;
  transition:opacity 0.15s;
}
.checkbox-label {
  font-family:var(--f-body);
  font-size:13px;
  color:var(--text-muted);
  line-height:1.5;
}
.checkbox-label .required-tag {
  font-size:11px;
  color:var(--text-light);
  margin-left:4px;
}
.checkbox-label .optional-tag {
  font-size:11px;
  color:var(--text-light);
  margin-left:4px;
}

/* ── 이메일 인증 뷰 ── */
#verifyView {
  display:none;
  padding:48px 24px 40px;
  flex-direction:column;
  align-items:center;
  text-align:center;
  gap:16px;
  flex:1;
}
#verifyView.visible { display:flex; }

.verify-icon {
  width:64px;
  height:64px;
  background:var(--bg-subtle);
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  margin-bottom:8px;
}
.verify-icon svg { width:32px; height:32px; color:var(--green); }

.verify-title {
  font-family:var(--f-head);
  font-size:18px;
  font-weight:700;
  color:var(--text);
  line-height:1.5;
}
.verify-sub {
  font-family:var(--f-body);
  font-size:14px;
  color:var(--text-muted);
  line-height:1.7;
}
.verify-email-badge {
  background:var(--bg-subtle);
  border:1px solid var(--border);
  border-radius:var(--r-full);
  padding:8px 18px;
  font-family:var(--f-body);
  font-size:13px;
  font-weight:500;
  color:var(--green);
}
.verify-back-btn {
  margin-top:8px;
  background:none;
  border:none;
  font-family:var(--f-body);
  font-size:13px;
  color:var(--text-light);
  cursor:pointer;
  text-decoration:underline;
  text-underline-offset:2px;
}
.verify-back-btn:hover { color:var(--text-muted); }

/* ── 폼 섹션 숨김 제어 ── */
.auth-body { flex:1; }

/* ── NAV DRAWER ── */
.nav-drawer{position:fixed;top:0;right:-100%;width:280px;height:100vh;background:var(--bg);z-index:200;transition:right 0.35s cubic-bezier(0.16,1,0.3,1);overflow-y:auto;box-shadow:-4px 0 24px rgba(0,0,0,0.12);}
.nav-drawer.open{right:0;}
.nav-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:199;opacity:0;pointer-events:none;transition:opacity 0.3s ease;}
.nav-overlay.open{opacity:1;pointer-events:all;}
.nav-drawer-hd{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:52px;border-bottom:1px solid var(--border);}
.nav-close{width:40px;height:40px;border:none;background:none;display:flex;align-items:center;justify-content:center;cursor:pointer;border-radius:var(--r-md);color:var(--text);transition:background 0.2s;}
.nav-close:hover{background:var(--bg-subtle);}
.nav-close svg{width:20px;height:20px;}
.nav-links{padding:24px 20px;display:flex;flex-direction:column;gap:0;}
.nav-links a{font-family:var(--f-head);font-size:22px;font-weight:700;color:var(--text);padding:14px 0;border-bottom:1px solid var(--border);transition:color 0.2s;display:block;}
.nav-links a:last-child{border-bottom:none;}
.nav-links a:hover{color:var(--green);}
.nav-sub-links{padding:20px 20px;display:flex;flex-direction:column;gap:4px;border-top:1px solid var(--border);}
.nav-sub-links a{font-family:var(--f-label);font-size:12px;font-weight:700;letter-spacing:0.06em;color:var(--text-muted);padding:8px 0;transition:color 0.2s;display:block;}
.nav-sub-links a:hover{color:var(--green);}
</style>
</head>
<body>
<div class="page">

  <!-- 헤더 -->
  <header class="gnb">
    <button class="gnb-back" onclick="history.back()" aria-label="뒤로가기">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </button>
    <span class="gnb-logo">SOWN</span>
  </header>

  <!-- auth body -->
  <div class="auth-body" id="authBody">

    <!-- 브랜드 아이덴티티 -->
    <div class="brand-area">
      <div class="brand-title">SOWN</div>
      <div class="brand-sub">기다림이 소원이 되는 시간</div>
    </div>

    <!-- 탭 -->
    <div class="tab-wrap">
      <button class="tab-btn active" id="tabLogin" onclick="switchTab('login')">로그인</button>
      <button class="tab-btn" id="tabSignup" onclick="switchTab('signup')">회원가입</button>
    </div>

    <!-- 로그인 폼 -->
    <form class="form-area" id="loginForm" onsubmit="handleLogin(event)" novalidate>

      <div class="field">
        <label class="field-label" for="loginEmail">이메일</label>
        <div class="input-wrap">
          <input type="email" id="loginEmail" placeholder="email@example.com" autocomplete="email">
        </div>
        <span class="field-error" id="loginEmailError">올바른 이메일 형식을 입력해주세요</span>
      </div>

      <div class="field">
        <label class="field-label" for="loginPw">비밀번호</label>
        <div class="input-wrap">
          <input type="password" id="loginPw" placeholder="비밀번호를 입력해주세요" autocomplete="current-password" class="has-icon">
          <button type="button" class="toggle-pw" onclick="togglePw('loginPw','eyeLogin')" aria-label="비밀번호 표시/숨김">
            <svg id="eyeLogin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <span class="field-error" id="loginPwError">이메일 또는 비밀번호가 일치하지 않습니다</span>
      </div>

      <div class="forgot-wrap">
        <a href="#" class="forgot-link">비밀번호를 잊으셨나요?</a>
      </div>

      <button type="submit" class="btn-primary">로그인</button>

      <div class="divider"><span>또는</span></div>

      <button type="button" class="btn-social btn-kakao" onclick="socialLogin('kakao')">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 3C6.477 3 2 6.477 2 10.8c0 2.736 1.63 5.145 4.098 6.553L5.08 21l4.395-2.892C10.26 18.355 11.12 18.5 12 18.5c5.523 0 10-3.477 10-7.7S17.523 3 12 3z"/>
        </svg>
        카카오로 계속하기
      </button>

      <button type="button" class="btn-social btn-naver" onclick="socialLogin('naver')">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M16 3v18l-4-6.5L8 21V3h4l4 6.5L16 3z"/>
        </svg>
        네이버로 계속하기
      </button>

    </form>

    <!-- 회원가입 폼 -->
    <form class="form-area hidden" id="signupForm" onsubmit="handleSignup(event)" novalidate>

      <div class="field">
        <label class="field-label" for="signupEmail">이메일</label>
        <div class="input-wrap">
          <input type="email" id="signupEmail" placeholder="email@example.com" autocomplete="email">
        </div>
        <span class="field-error" id="signupEmailError">올바른 이메일 형식을 입력해주세요</span>
      </div>

      <div class="field">
        <label class="field-label" for="signupPw">비밀번호</label>
        <div class="input-wrap">
          <input type="password" id="signupPw" placeholder="8자 이상 입력해주세요" autocomplete="new-password" class="has-icon">
          <button type="button" class="toggle-pw" onclick="togglePw('signupPw','eyeSignupPw')" aria-label="비밀번호 표시/숨김">
            <svg id="eyeSignupPw" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <span class="field-error" id="signupPwError">비밀번호는 8자 이상이어야 합니다</span>
      </div>

      <div class="field">
        <label class="field-label" for="signupPwConfirm">비밀번호 확인</label>
        <div class="input-wrap">
          <input type="password" id="signupPwConfirm" placeholder="비밀번호를 다시 입력해주세요" autocomplete="new-password" class="has-icon">
          <button type="button" class="toggle-pw" onclick="togglePw('signupPwConfirm','eyeSignupPwC')" aria-label="비밀번호 확인 표시/숨김">
            <svg id="eyeSignupPwC" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <span class="field-error" id="signupPwConfirmError">비밀번호가 일치하지 않습니다</span>
      </div>

      <div class="field">
        <label class="field-label" for="signupName">이름</label>
        <div class="input-wrap">
          <input type="text" id="signupName" placeholder="이름을 입력해주세요" autocomplete="name">
        </div>
        <span class="field-error" id="signupNameError">이름을 입력해주세요</span>
      </div>

      <div class="field">
        <label class="field-label" for="signupPhone">연락처</label>
        <div class="input-wrap">
          <input type="tel" id="signupPhone" placeholder="010-0000-0000" autocomplete="tel" maxlength="13">
        </div>
        <span class="field-error" id="signupPhoneError">올바른 연락처를 입력해주세요</span>
      </div>

      <!-- 약관 동의 -->
      <div class="checkbox-group">
        <label class="checkbox-item">
          <input type="checkbox" id="agreeTerms">
          <span class="checkbox-box">
            <svg viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="1.5 5 4 7.5 8.5 2.5"/>
            </svg>
          </span>
          <span class="checkbox-label">이용약관 및 개인정보처리방침에 동의합니다<span class="required-tag">(필수)</span></span>
        </label>
        <span class="field-error" id="agreeTermsError">약관에 동의해주세요</span>

        <label class="checkbox-item">
          <input type="checkbox" id="agreeMkt">
          <span class="checkbox-box">
            <svg viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="1.5 5 4 7.5 8.5 2.5"/>
            </svg>
          </span>
          <span class="checkbox-label">발효·클래스 소식 이메일 수신에 동의합니다<span class="optional-tag">(선택)</span></span>
        </label>
      </div>

      <button type="submit" class="btn-primary">회원가입</button>

    </form>

  </div>

  <!-- 이메일 인증 화면 -->
  <div id="verifyView">
    <div class="verify-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
        <polyline points="22,6 12,13 2,6"/>
      </svg>
    </div>
    <div class="verify-title">이메일 인증 후<br>SOWN을 이용하실 수 있습니다</div>
    <div class="verify-sub">입력하신 이메일로 인증 메일을 발송했습니다.<br>메일함을 확인해주세요.</div>
    <div class="verify-email-badge" id="verifyEmailBadge"></div>
    <button type="button" class="verify-back-btn" onclick="backToLogin()">로그인 화면으로 돌아가기</button>
  </div>

</div>

<script>
/* ── 탭 전환 ── */
function switchTab(tab) {
  const loginForm = document.getElementById('loginForm');
  const signupForm = document.getElementById('signupForm');
  const tabLogin = document.getElementById('tabLogin');
  const tabSignup = document.getElementById('tabSignup');
  const authBody = document.getElementById('authBody');
  const verifyView = document.getElementById('verifyView');

  verifyView.classList.remove('visible');
  authBody.style.display = '';

  if (tab === 'login') {
    loginForm.classList.remove('hidden');
    signupForm.classList.add('hidden');
    tabLogin.classList.add('active');
    tabSignup.classList.remove('active');
  } else {
    signupForm.classList.remove('hidden');
    loginForm.classList.add('hidden');
    tabSignup.classList.add('active');
    tabLogin.classList.remove('active');
  }
  clearAllErrors();
}

/* ── 비밀번호 show/hide ── */
function togglePw(inputId, iconId) {
  const input = document.getElementById(inputId);
  const icon = document.getElementById(iconId);
  const isHidden = input.type === 'password';
  input.type = isHidden ? 'text' : 'password';
  icon.innerHTML = isHidden
    ? '<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>'
    : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
}

/* ── 연락처 자동 하이픈 ── */
document.getElementById('signupPhone').addEventListener('input', function(e) {
  let v = e.target.value.replace(/[^0-9]/g, '');
  if (v.length <= 3) {
    e.target.value = v;
  } else if (v.length <= 7) {
    e.target.value = v.slice(0,3) + '-' + v.slice(3);
  } else {
    e.target.value = v.slice(0,3) + '-' + v.slice(3,7) + '-' + v.slice(7,11);
  }
});

/* ── 유효성 검사 헬퍼 ── */
function isValidEmail(v) {
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v.trim());
}
function isValidPhone(v) {
  return /^01[0-9]-\d{3,4}-\d{4}$/.test(v.trim());
}
function showError(id, msg) {
  const el = document.getElementById(id);
  if (el) {
    if (msg) el.textContent = msg;
    el.classList.add('visible');
  }
}
function hideError(id) {
  const el = document.getElementById(id);
  if (el) el.classList.remove('visible');
}
function setInputError(inputId, hasError) {
  const el = document.getElementById(inputId);
  if (!el) return;
  if (hasError) el.classList.add('error');
  else el.classList.remove('error');
}
function clearAllErrors() {
  document.querySelectorAll('.field-error').forEach(el => el.classList.remove('visible'));
  document.querySelectorAll('input').forEach(el => el.classList.remove('error'));
}

/* ── 로그인 ── */
function handleLogin(e) {
  e.preventDefault();
  let valid = true;
  const email = document.getElementById('loginEmail').value;
  const pw = document.getElementById('loginPw').value;

  hideError('loginEmailError');
  hideError('loginPwError');
  setInputError('loginEmail', false);
  setInputError('loginPw', false);

  if (!email || !isValidEmail(email)) {
    showError('loginEmailError', '올바른 이메일 형식을 입력해주세요');
    setInputError('loginEmail', true);
    valid = false;
  }
  if (!pw) {
    showError('loginPwError', '비밀번호를 입력해주세요');
    setInputError('loginPw', true);
    valid = false;
  }
  if (!valid) return;
  // 실제 로그인 로직 연결 지점
  console.log('로그인 시도:', email);
}

/* ── 회원가입 ── */
function handleSignup(e) {
  e.preventDefault();
  let valid = true;

  const email = document.getElementById('signupEmail').value;
  const pw = document.getElementById('signupPw').value;
  const pwC = document.getElementById('signupPwConfirm').value;
  const name = document.getElementById('signupName').value;
  const phone = document.getElementById('signupPhone').value;
  const terms = document.getElementById('agreeTerms').checked;

  ['signupEmailError','signupPwError','signupPwConfirmError','signupNameError','signupPhoneError','agreeTermsError'].forEach(hideError);
  ['signupEmail','signupPw','signupPwConfirm','signupName','signupPhone'].forEach(id => setInputError(id, false));

  if (!email || !isValidEmail(email)) {
    showError('signupEmailError', '올바른 이메일 형식을 입력해주세요');
    setInputError('signupEmail', true);
    valid = false;
  }
  if (!pw || pw.length < 8) {
    showError('signupPwError', '비밀번호는 8자 이상이어야 합니다');
    setInputError('signupPw', true);
    valid = false;
  }
  if (pw && pwC && pw !== pwC) {
    showError('signupPwConfirmError', '비밀번호가 일치하지 않습니다');
    setInputError('signupPwConfirm', true);
    valid = false;
  } else if (!pwC) {
    showError('signupPwConfirmError', '비밀번호 확인을 입력해주세요');
    setInputError('signupPwConfirm', true);
    valid = false;
  }
  if (!name.trim()) {
    showError('signupNameError', '이름을 입력해주세요');
    setInputError('signupName', true);
    valid = false;
  }
  if (!phone || !isValidPhone(phone)) {
    showError('signupPhoneError', '올바른 연락처를 입력해주세요');
    setInputError('signupPhone', true);
    valid = false;
  }
  if (!terms) {
    showError('agreeTermsError', '약관에 동의해주세요');
    valid = false;
  }
  if (!valid) return;

  // 이메일 인증 화면 전환
  showVerify(email);
}

/* ── 이메일 인증 화면 전환 ── */
function showVerify(email) {
  const authBody = document.getElementById('authBody');
  const verifyView = document.getElementById('verifyView');
  const badge = document.getElementById('verifyEmailBadge');

  authBody.style.display = 'none';
  badge.textContent = email;
  verifyView.classList.add('visible');
}

function backToLogin() {
  const authBody = document.getElementById('authBody');
  const verifyView = document.getElementById('verifyView');

  verifyView.classList.remove('visible');
  authBody.style.display = '';
  switchTab('login');
}

/* ── 소셜 로그인 ── */
function socialLogin(provider) {
  console.log('소셜 로그인:', provider);
}

// Nav drawer
(function(){
  var d=document.getElementById('navDrawer'),o=document.getElementById('navOverlay'),c=document.getElementById('navClose'),m=document.querySelector('[aria-label="메뉴"]');
  function openNav(){d.classList.add('open');o.classList.add('open');document.body.style.overflow='hidden';}
  function closeNav(){d.classList.remove('open');o.classList.remove('open');document.body.style.overflow='';}
  if(m) m.addEventListener('click',openNav);
  if(c) c.addEventListener('click',closeNav);
  if(o) o.addEventListener('click',closeNav);
})();
</script>
</body>
</html>
