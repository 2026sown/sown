<html lang="ko">

<link rel="preconnect" href="https://cdn.jsdelivr.net">

<link href="https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_suit@1.0/SUIT.css" rel="stylesheet">

<style>
:root {
  --bg:#F5F0E8; --bg-subtle:#EDE7D8;
  --green:#054f19; --green-dark:#033610; --lime:#DAF15B;
  --white:#FFFFFF; --text:#111A13; --text-muted:#4A5C4D; --text-light:#8A9B8D;
  --border:rgba(5,79,25,0.12); --shadow-sm:0 1px 4px rgba(5,79,25,0.08);
  --error:#C0392B; --warning:#E65100;
  --sidebar-w:220px; --topbar-h:56px;
  --f-head:'Pretendard',sans-serif; --f-body:'Suit','Noto Sans KR',sans-serif; --f-label:'GMarketSans','Suit',sans-serif;
  --r-sm:4px; --r-md:8px; --r-lg:16px; --r-full:999px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:#EDE7D8;font-family:var(--f-body);color:var(--text);min-height:100vh;}

/* ── 사이드바 ── */
.sidebar{
  position:fixed;top:0;left:0;width:var(--sidebar-w);height:100vh;
  background:var(--green);display:flex;flex-direction:column;z-index:100;
}
.sidebar-logo{
  height:var(--topbar-h);display:flex;align-items:center;padding:0 20px;
  border-bottom:1px solid rgba(255,255,255,0.08);flex-shrink:0;
}
.sidebar-logo span{
  font-family:var(--f-label);font-size:20px;color:var(--lime);letter-spacing:0.04em;
}
.sidebar-nav{flex:1;overflow-y:auto;padding:12px 0;}
.nav-item{
  display:flex;align-items:center;gap:10px;padding:10px 20px;
  color:rgba(255,255,255,0.6);font-size:13.5px;font-family:var(--f-body);
  text-decoration:none;cursor:pointer;transition:background 0.15s,color 0.15s;
  position:relative;
}
.nav-item:hover{background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.9);}
.nav-item.active{background:rgba(218,241,91,0.12);color:var(--lime);}
.nav-item.active::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  background:var(--lime);border-radius:0 2px 2px 0;
}
.nav-icon{width:16px;height:16px;flex-shrink:0;opacity:0.7;}
.nav-item.active .nav-icon{opacity:1;}
.nav-badge{
  margin-left:auto;background:var(--lime);color:var(--green);
  font-size:10px;font-weight:700;padding:1px 6px;border-radius:var(--r-full);
}

/* ── 탑바 ── */
.topbar{
  position:fixed;top:0;left:var(--sidebar-w);right:0;height:var(--topbar-h);
  background:var(--white);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 28px;z-index:90;box-shadow:var(--shadow-sm);
}
.topbar-title{font-family:var(--f-head);font-size:15px;font-weight:600;color:var(--text);}
.topbar-user{
  display:flex;align-items:center;gap:8px;
  font-size:13px;color:var(--text-muted);
}
.topbar-avatar{
  width:30px;height:30px;border-radius:var(--r-full);
  background:var(--green);display:flex;align-items:center;justify-content:center;
  color:var(--lime);font-size:12px;font-weight:700;
}

/* ── 메인 콘텐츠 ── */
.main{margin-left:var(--sidebar-w);padding-top:var(--topbar-h);}
.content{padding:28px;}

/* ── 페이지 헤더 ── */
.page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px;gap:16px;flex-wrap:wrap;}
.page-header-left{}
.page-title{font-family:var(--f-head);font-size:22px;font-weight:700;color:var(--text);margin-bottom:4px;}
.page-desc{font-size:13px;color:var(--text-muted);}
.page-actions{display:flex;gap:8px;flex-shrink:0;}

/* ── 버튼 ── */
.btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:8px 16px;border-radius:var(--r-md);font-size:13px;font-weight:600;
  font-family:var(--f-body);cursor:pointer;border:none;transition:background 0.15s,opacity 0.15s;
  text-decoration:none;
}
.btn-primary{background:var(--green);color:var(--white);}
.btn-primary:hover{background:var(--green-dark);}
.btn-outline{background:var(--white);color:var(--text-muted);border:1px solid var(--border);}
.btn-outline:hover{background:var(--bg-subtle);color:var(--text);}
.btn-sm{padding:5px 11px;font-size:12px;}
.btn-danger{background:rgba(192,57,43,0.08);color:var(--error);border:1px solid rgba(192,57,43,0.2);}
.btn-danger:hover{background:rgba(192,57,43,0.14);}

/* ── KPI 카드 ── */
.kpi-row{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px;}
.kpi-card{
  background:var(--white);border:1px solid var(--border);border-radius:var(--r-lg);
  padding:18px 20px;box-shadow:var(--shadow-sm);
}
.kpi-label{font-size:12px;color:var(--text-light);font-family:var(--f-label);letter-spacing:0.04em;margin-bottom:8px;}
.kpi-value{font-family:var(--f-head);font-size:26px;font-weight:700;color:var(--text);line-height:1;}
.kpi-value.warn{color:var(--warning);}
.kpi-value.danger{color:var(--error);}
.kpi-sub{font-size:11px;color:var(--text-light);margin-top:4px;}

/* ── 필터 바 ── */
.filter-bar{
  display:flex;align-items:center;justify-content:space-between;
  gap:12px;margin-bottom:16px;flex-wrap:wrap;
}
.tab-group{display:flex;gap:4px;background:var(--white);border:1px solid var(--border);border-radius:var(--r-md);padding:3px;}
.tab-btn{
  padding:6px 14px;border-radius:var(--r-sm);font-size:13px;font-weight:500;
  font-family:var(--f-body);cursor:pointer;border:none;background:transparent;
  color:var(--text-muted);transition:background 0.15s,color 0.15s;
}
.tab-btn.active{background:var(--green);color:var(--white);}
.tab-btn:not(.active):hover{background:var(--bg-subtle);color:var(--text);}

.search-wrap{position:relative;flex:1;max-width:280px;}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-light);}
.search-input{
  width:100%;padding:8px 12px 8px 34px;
  border:1px solid var(--border);border-radius:var(--r-md);
  font-size:13px;font-family:var(--f-body);color:var(--text);
  background:var(--white);outline:none;transition:border 0.15s;
}
.search-input:focus{border-color:var(--green);}
.search-input::placeholder{color:var(--text-light);}

/* ── 테이블 ── */
.table-wrap{background:var(--white);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--shadow-sm);}
.tbl{width:100%;border-collapse:collapse;}
.tbl thead tr{border-bottom:1px solid var(--border);background:var(--bg-subtle);}
.tbl th{
  padding:11px 14px;text-align:left;
  font-size:11.5px;font-weight:700;color:var(--text-light);
  font-family:var(--f-label);letter-spacing:0.05em;white-space:nowrap;
}
.tbl tbody tr{border-bottom:1px solid var(--border);transition:background 0.12s;}
.tbl tbody tr:last-child{border-bottom:none;}
.tbl tbody tr:hover{background:rgba(5,79,25,0.025);}
.tbl td{padding:12px 14px;font-size:13px;color:var(--text);}

/* 재고 인라인 입력 */
.stock-input{
  width:72px;padding:5px 8px;border:1px solid var(--border);border-radius:var(--r-sm);
  font-size:13px;font-family:var(--f-body);color:var(--text);background:var(--bg-subtle);
  text-align:center;outline:none;transition:border 0.15s;
}
.stock-input:focus{border-color:var(--green);background:var(--white);}

/* ── 상태 뱃지 ── */
.badge{
  display:inline-flex;align-items:center;padding:3px 10px;border-radius:var(--r-full);
  font-size:11px;font-weight:700;font-family:var(--f-label);letter-spacing:0.04em;
}
.badge-normal{background:var(--bg-subtle);color:var(--text-muted);}
.badge-warn{background:rgba(230,81,0,0.1);color:var(--warning);}
.badge-danger{background:rgba(192,57,43,0.1);color:var(--error);}

/* ── 액션 셀 ── */
.action-cell{display:flex;gap:6px;align-items:center;}

/* ── 빈 상태 ── */
.empty-state{
  text-align:center;padding:56px 20px;
  color:var(--text-light);font-size:13px;
  display:none;
}
.empty-state svg{display:block;margin:0 auto 12px;opacity:0.3;}

/* ── 모달 ── */
.modal-overlay{
  display:none;position:fixed;inset:0;background:rgba(5,15,8,0.45);
  z-index:200;align-items:center;justify-content:center;
}
.modal-overlay.open{display:flex;}
.modal{
  background:var(--white);border-radius:var(--r-lg);padding:28px 28px 24px;
  width:100%;max-width:400px;box-shadow:0 8px 32px rgba(5,79,25,0.14);
  animation:modalIn 0.2s ease;
}
@keyframes modalIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
.modal-title{font-family:var(--f-head);font-size:17px;font-weight:700;margin-bottom:20px;color:var(--text);}
.form-group{margin-bottom:16px;}
.form-label{display:block;font-size:12px;font-weight:600;color:var(--text-muted);margin-bottom:6px;font-family:var(--f-label);letter-spacing:0.03em;}
.form-control{
  width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--r-md);
  font-size:13px;font-family:var(--f-body);color:var(--text);background:var(--white);
  outline:none;transition:border 0.15s;
}
.form-control:focus{border-color:var(--green);}
.form-control[readonly]{background:var(--bg-subtle);color:var(--text-muted);}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:24px;}

/* ── 토스트 ── */
.toast{
  position:fixed;bottom:28px;right:28px;z-index:300;
  background:var(--green);color:var(--white);
  padding:12px 20px;border-radius:var(--r-md);font-size:13px;font-weight:600;
  box-shadow:0 4px 16px rgba(5,79,25,0.22);
  opacity:0;transform:translateY(8px);
  transition:opacity 0.25s,transform 0.25s;pointer-events:none;
  display:flex;align-items:center;gap:8px;
}
.toast.show{opacity:1;transform:none;}
</style>
</head>

<script>
const products = [
  { id:1, name:'소운 린넨 블라우스', category:'상의', stock:0,  changed:'2026-05-13' },
  { id:2, name:'소운 코튼 와이드 팬츠', category:'하의', stock:3,  changed:'2026-05-12' },
  { id:3, name:'소운 실크 카라 셔츠', category:'상의', stock:7,  changed:'2026-05-11' },
  { id:4, name:'소운 울 미디 스커트', category:'하의', stock:15, changed:'2026-05-10' },
  { id:5, name:'소운 캔버스 토트백', category:'가방', stock:25, changed:'2026-05-09' },
  { id:6, name:'소운 리넨 점프수트', category:'원피스', stock:50, changed:'2026-05-08' },
];

let activeTab = 'all';
let searchVal = '';
let editingId = null;

function getStatus(stock){
  if(stock === 0) return 'soldout';
  if(stock <= 10) return 'warn';
  return 'normal';
}

function badgeHtml(stock){
  const st = getStatus(stock);
  if(st === 'soldout') return '<span class="badge badge-danger">품절</span>';
  if(st === 'warn')    return '<span class="badge badge-warn">부족</span>';
  return '<span class="badge badge-normal">정상</span>';
}

function renderTable(){
  const body = document.getElementById('stockBody');
  let rows = products.filter(p => {
    const matchTab = activeTab === 'all' ? true
      : activeTab === 'soldout' ? p.stock === 0
      : p.stock > 0 && p.stock <= 10;
    const matchSearch = p.name.includes(searchVal);
    return matchTab && matchSearch;
  });

  const empty = document.getElementById('emptyState');
  if(rows.length === 0){
    body.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  body.innerHTML = rows.map(p => `
    <tr id="row-${p.id}">
      <td style="font-weight:600">${p.name}</td>
      <td style="color:var(--text-muted)">${p.category}</td>
      <td>
        <input class="stock-input" type="number" min="0" value="${p.stock}"
          onchange="updateStock(${p.id}, this.value)" data-id="${p.id}">
      </td>
      <td>${badgeHtml(p.stock)}</td>
      <td style="color:var(--text-muted)">${p.changed}</td>
      <td>
        <div class="action-cell">
          <button class="btn btn-sm btn-outline" onclick="openModal(${p.id})">재고 수정</button>
          <button class="btn btn-sm btn-danger" onclick="setSoldout(${p.id})">품절 처리</button>
        </div>
      </td>
    </tr>
  `).join('');

  updateKpi();
}

function updateStock(id, val){
  const p = products.find(x => x.id === id);
  if(!p) return;
  p.stock = Math.max(0, parseInt(val) || 0);
  p.changed = new Date().toISOString().slice(0,10);
  renderTable();
}

function setSoldout(id){
  const p = products.find(x => x.id === id);
  if(!p) return;
  p.stock = 0;
  p.changed = new Date().toISOString().slice(0,10);
  renderTable();
  showToast();
}

function updateKpi(){
  document.getElementById('kpiWarn').textContent = products.filter(p => p.stock > 0 && p.stock <= 10).length;
  document.getElementById('kpiSoldout').textContent = products.filter(p => p.stock === 0).length;
}

function switchTab(el, tab){
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  activeTab = tab;
  renderTable();
}

function filterTable(){
  searchVal = document.querySelector('.search-input').value.trim();
  renderTable();
}

function openModal(id){
  const p = products.find(x => x.id === id);
  if(!p) return;
  editingId = id;
  document.getElementById('modalProduct').value = p.name;
  document.getElementById('modalStock').value = p.stock;
  document.getElementById('modalReason').value = '';
  document.getElementById('editModal').classList.add('open');
}

function closeModal(){
  document.getElementById('editModal').classList.remove('open');
  editingId = null;
}

function saveModal(){
  if(editingId === null) return;
  const stock = parseInt(document.getElementById('modalStock').value);
  if(isNaN(stock) || stock < 0){ alert('올바른 재고 수를 입력해주세요.'); return; }
  const p = products.find(x => x.id === editingId);
  if(p){
    p.stock = stock;
    p.changed = new Date().toISOString().slice(0,10);
  }
  closeModal();
  renderTable();
  showToast();
}

function downloadExcel(){
  showToast('엑셀 파일을 다운로드합니다');
}

function showToast(msg){
  const t = document.getElementById('toast');
  if(msg) t.querySelector('svg + *') && (t.lastChild.textContent = msg);
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}

// 모달 외부 클릭 닫기
document.getElementById('editModal').addEventListener('click', function(e){
  if(e.target === this) closeModal();
});

// 초기 렌더
renderTable();
</script>
</body>
</html>
